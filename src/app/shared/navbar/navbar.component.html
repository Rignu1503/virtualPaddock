<header class="fixed top-0 left-0 w-full z-50 backdrop-blur-lg bg-black/40 border-b border-white/10">
  <div class="max-w-7xl flex flex-wrap items-center justify-between mx-auto px-6 py-4">

    <!-- Logo -->
    <a href="#" class="flex items-center space-x-3">
      <img src="https://flowbite.com/docs/images/logo.svg"
           class="h-7"
           alt="Virtual Paddock Logo" />
      <span class="text-xl font-semibold text-white tracking-wide">
        Virtual Paddock
      </span>
    </a>

    <!-- Botón Hamburguesa -->
    <button
      data-collapse-toggle="navbar-default"
      type="button"
      class="inline-flex items-center p-2 w-10 h-10 justify-center text-white rounded-lg md:hidden hover:bg-white/10 focus:outline-none focus:ring-2 focus:ring-white/20 transition"
      aria-controls="navbar-default"
      aria-expanded="false"
    >
      <span class="sr-only">Abrir menú</span>
      <svg class="w-6 h-6"
           xmlns="http://www.w3.org/2000/svg"
           fill="none"
           viewBox="0 0 24 24"
           stroke="currentColor"
           stroke-width="2">
        <path stroke-linecap="round"
              stroke-linejoin="round"
              d="M4 6h16M4 12h16M4 18h16"/>
      </svg>
    </button>

    <!-- Menú -->
    <div class="hidden w-full md:block md:w-auto" id="navbar-default">
      <ul class="flex flex-col md:flex-row md:items-center md:space-x-8 mt-4 md:mt-0
                 bg-black/90 md:bg-transparent backdrop-blur-lg md:backdrop-blur-none
                 border border-white/10 md:border-0 rounded-lg md:rounded-none
                 p-4 md:p-0 text-sm font-medium">

        <li>
          <a href="#" class="block py-2 text-white/80 hover:text-white transition">
            Inicio
          </a>
        </li>

        <li>
          <a href="#" class="block py-2 text-white/80 hover:text-white transition">
            Ligas
          </a>
        </li>

        <li>
          <a href="#" class="block py-2 text-white/80 hover:text-white transition">
            Pilotos
          </a>
        </li>

        <li>
          <a href="#" class="block py-2 text-white/80 hover:text-white transition">
            Equipos
          </a>
        </li>

        <li>
          <a href="#" class="block py-2 text-white/80 hover:text-white transition">
            Estadísticas
          </a>
        </li>

        <li>
          <a href="#"
             class="mt-2 md:mt-0 inline-block px-5 py-2 rounded-full bg-red-600 text-white font-semibold hover:bg-red-700 transition">
            Ingresar
          </a>
        </li>

      </ul>
    </div>

  </div>
</header>
